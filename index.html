    <style>
        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Node Map Canvas */
        #knowledge-canvas { cursor: grab; }
        #knowledge-canvas:active { cursor: grabbing; }

        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            width: 24px; height: 24px; border-radius: 50%;
            border-left-color: #22c55e;
            animation: spin 1s linear infinite;
        }
        .dark .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #22c55e; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .pulse-dot {
            width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

    <script type="text/babel">
        // --- Setup PDF.js Worker ---

            Bot: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>,
            Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,

            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        };

        // --- Utility Functions ---
        async function extractTextFromPDF(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = "";
                
                // Limit to first 15 pages to prevent massive token usage in browser demo
                const numPagesToExtract = Math.min(pdf.numPages, 15); 
                
                for (let i = 1; i <= numPagesToExtract; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += `[Page ${i}] ` + pageText + "\n\n";
                }
                return { 
                    id: Date.now() + Math.random().toString(36).substr(2, 9),
                    name: file.name, 
                    size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                    text: fullText,
                    selected: true,
                    pagesProcessed: numPagesToExtract
                };
            } catch (error) {
                console.error("Error reading PDF:", error);
                throw error;
            }
        }

        async function callGemini(prompt, apiKey, format = "text", systemInst = "") {
            if (!apiKey) throw new Error("API Key required");
            
            // Exponential backoff logic
            const maxRetries = 5;
            let delay = 1000;
            
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                    };
                    
                    if (systemInst) {
                        payload.systemInstruction = { parts: [{ text: systemInst }] };
                    }

                    if (format === "json") {
                        payload.generationConfig = { 
                            responseMimeType: "application/json" 
                        };
                    }

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }

                    const data = await response.json();
                    const textContent = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!textContent) throw new Error("Empty response from API");

                    if (format === "json") {
                        try {
                            return JSON.parse(textContent);
                        } catch (e) {
                            console.error("Failed to parse JSON response:", textContent);
                            // Attempt to sanitize if markdown block is present
                            const cleaned = textContent.replace(/```json\n?|\n?```/g, '').trim();
                            return JSON.parse(cleaned);
                        }
                    }
                    return textContent;
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        // Context builder
        function getSelectedContext(documents) {
            const selectedDocs = documents.filter(d => d.selected);
            if (selectedDocs.length === 0) return "No documents provided.";
            
            let context = "CONTEXT FROM UPLOADED DOCUMENTS:\n\n";
            selectedDocs.forEach(doc => {
                context += `--- DOCUMENT: ${doc.name} ---\n`;
                // Truncate text slightly to avoid huge payloads in demo, keep ~30k chars per doc max
                context += doc.text.substring(0, 30000) + (doc.text.length > 30000 ? "...\n[Text Truncated]" : "") + "\n\n";
            });
            return context;
        }


        // --- React Components ---

        const DashboardView = ({ documents, apiKey, dashboardData, setDashboardData }) => {
            const [isAnalyzing, setIsAnalyzing] = React.useState(false);
            const [progress, setProgress] = React.useState(0);
            const [stage, setStage] = React.useState('');

            React.useEffect(() => {
                const analyzeDocs = async () => {
                    const selectedDocs = documents.filter(d => d.selected);
                    if (selectedDocs.length === 0) return;
                    if (!apiKey) return;
                    
                    setIsAnalyzing(true);
                    setStage('Insight Lens: Material Analysis...');
                    setProgress(20);
                    
                    const context = getSelectedContext(documents);
                    const prompt = `
                    Analyze the following environmental/sustainability document text.
                    Act as EcoLens, an AI that identifies circular economy opportunities.
                    Extract data and return ONLY a valid JSON object matching this schema exactly:
                    {
                        "complianceScore": <number between 0 and 100>,
                        "overallProgress": <number between 0 and 100>,
                        "opportunities": [
                            { "title": "<string>", "feasibility": <number>, "description": "<string>", "impact": "High" | "Medium" | "Low" }
                        ],
                        "auditorLogs": [
                            { "time": "<HH:MM:SS>", "message": "<string>", "status": "Compliant" | "Warning" | "Risk" | "Completed" }
                        ],
                        "summary": "<A 2-3 sentence summary of findings>"
                    }
                    Keep it realistic based on the text. Generate 3-4 opportunities. Generate 4-5 log entries.
                    \n\nTEXT:\n${context.substring(0, 50000)}
                    `;

                    try {
                        setTimeout(() => { setStage('Opportunity Lens: Circular Mapping...'); setProgress(50); }, 1500);
                        setTimeout(() => { setStage('Compliance Lens: Regulatory Audit...'); setProgress(80); }, 3000);
                        
                        const data = await callGemini(prompt, apiKey, "json");
                        setDashboardData(data);
                        setProgress(100);
                        setStage('Completed');
                    } catch (err) {
                        console.error("Dashboard analysis failed", err);
                        // Fallback dummy data if it fails or parses wrong
                        setDashboardData({
                            complianceScore: 78,
                            overallProgress: 100,
                            opportunities: [
                                { title: "Biochar Production", feasibility: 92, description: "High carbon content makes it ideal for biochar.", impact: "High" },
                                { title: "Animal Feed Additive", feasibility: 84, description: "Nutrient profile suitable for livestock feed.", impact: "Medium" }
                            ],
                            auditorLogs: [
                                { time: "10:42:11", message: "Checking waste classification...", status: "Compliant" },
                                { time: "10:42:13", message: "Verifying environmental permits...", status: "Warning" }
                            ],
                            summary: "The document indicates strong potential for circular utilization of processed waste."
                        });
                    } finally {
                        setIsAnalyzing(false);
                    }
                };

                // Only run if we don't have data and we have docs, OR if docs changed (simplified logic here)
                if (documents.filter(d => d.selected).length > 0 && !isAnalyzing) {
                   analyzeDocs();
                }
            }, [documents.map(d=>d.selected).join(','), documents.length]);

            if (documents.length === 0) {
                return <div className="flex items-center justify-center h-full text-slate-500">Upload documents to see the dashboard analysis.</div>;
            }

            const data = dashboardData || {
                complianceScore: 0, overallProgress: 0, opportunities: [], auditorLogs: [], summary: "Awaiting analysis..."
            };

            return (
                <div className="grid grid-cols-3 gap-6 animate-fade-in">
                    {/* Pipeline */}
                    <div className="col-span-2 bg-white dark:bg-slate-900 rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-lg font-semibold flex items-center gap-2"><Icons.TrendingUp/> AI Analysis Pipeline <span className="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded-full ml-2 font-medium border border-green-200 dark:bg-green-900 dark:text-green-300 dark:border-green-800">Live</span></h2>
                        </div>
                        
                        {/* Status Nodes */}
                        <div className="flex justify-between items-center relative mb-8 px-8">
                            <div className="absolute left-10 right-10 top-1/2 h-0.5 bg-slate-200 dark:bg-slate-700 -z-10 transform -translate-y-1/2"></div>
                            
                            <div className="flex flex-col items-center gap-2 bg-white dark:bg-slate-900">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 ${progress > 10 ? 'border-green-500 bg-green-50 dark:bg-green-900/30 text-green-600' : 'border-slate-200 text-slate-400'}`}>
                                    <Icons.Search />
                                </div>
                                <span className="text-xs font-medium">Insight Lens</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 bg-white dark:bg-slate-900">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 ${progress > 40 ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/30 text-blue-600' : 'border-slate-200 text-slate-400'}`}>
                                    <Icons.TrendingUp />
                                </div>
                                <span className="text-xs font-medium">Opportunity Lens</span>
                            </div>
                            <div className="flex flex-col items-center gap-2 bg-white dark:bg-slate-900">
                                <div className={`w-12 h-12 rounded-full flex items-center justify-center border-2 ${progress > 70 ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/30 text-purple-600' : 'border-slate-200 text-slate-400'}`}>
                                    <Icons.Shield />
                                </div>
                                <span className="text-xs font-medium">Compliance Lens</span>
                            </div>
                        </div>

                        {/* Progress Details */}
                        <div className="space-y-4">
                            <div className="flex justify-between text-sm mb-1">
                                <span className="text-slate-500">Current Stage: <strong className="text-slate-900 dark:text-slate-100">{stage || 'Waiting...'}</strong></span>
                                {isAnalyzing && <span className="flex items-center gap-2 text-slate-500"><div className="spinner w-4 h-4 border-2"></div> Processing...</span>}
                            </div>
                            
                            <div className="bg-slate-50 dark:bg-slate-800/50 rounded-lg p-4 flex justify-between items-center border border-slate-100 dark:border-slate-700">
                                <div>
                                    <h4 className="font-medium text-sm">Insight Lens <span className="text-xs bg-green-100 text-green-700 px-1.5 rounded ml-2 dark:bg-green-900 dark:text-green-300">Completed</span></h4>
                                    <p className="text-xs text-slate-500 mt-1">Extracted key materials, composition, and environmental insights.</p>
                                </div>
                                <button className="text-xs font-medium text-green-600 hover:text-green-700">View Results</button>
                            </div>

                            <div className="flex items-center gap-4 text-sm mt-6">
                                <span className="text-slate-500 whitespace-nowrap">Overall Progress</span>
                                <div className="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
                                    <div className="bg-green-500 h-2 rounded-full transition-all duration-500" style={{width: `${progress}%`}}></div>
                                </div>
                                <span className="font-medium">{progress}%</span>
                            </div>
                        </div>
                    </div>

                    {/* Auditor */}
                    <div className="col-span-1 bg-white dark:bg-slate-900 rounded-xl p-6 border border-slate-200 dark:border-slate-800 shadow-sm flex flex-col">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-lg font-semibold flex items-center gap-2"><Icons.Shield/> Compliance Auditor</h2>
                            <div className="flex items-center gap-1 text-xs text-green-600"><div className="pulse-dot w-2 h-2"></div> Live Log</div>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-3 text-xs font-mono">
                            {data.auditorLogs.map((log, i) => (
                                <div key={i} className="flex justify-between items-start gap-2 border-b border-slate-100 dark:border-slate-800 pb-2">
                                    <span className="text-slate-400">{log.time}</span>
                                    <span className="flex-1 text-slate-700 dark:text-slate-300">{log.message}</span>
                                    <span className={`px-1.5 py-0.5 rounded text-[10px] uppercase font-bold tracking-wide
                                        ${log.status === 'Compliant' || log.status === 'Completed' ? 'bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-400' : 
                                          log.status === 'Warning' ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/50 dark:text-yellow-400' : 
                                          'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-400'}`}>
                                        {log.status}
                                    </span>
                                </div>
                            ))}
                            {data.auditorLogs.length === 0 && <div className="text-slate-400 italic">Logs will appear during analysis...</div>}
                        </div>
                        
                        <div className="mt-6 pt-4 border-t border-slate-200 dark:border-slate-800">
                             <div className="flex items-center justify-between">
                                 <div>
                                    <h3 className="text-sm font-semibold mb-1">Readiness Score</h3>
                                    <p className="text-xs text-slate-500">Based on regulatory checks</p>
                                 </div>
                                 <div className="relative w-16 h-16 flex items-center justify-center">

        const KnowledgeMap = ({ documents, apiKey }) => {
            const canvasRef = React.useRef(null);
            const [loading, setLoading] = React.useState(false);
            const [graphData, setGraphData] = React.useState(null);

            const generateGraph = async () => {
                if (!apiKey) return;
                setLoading(true);
                try {
                    const ctx = getSelectedContext(documents);
                    const prompt = `Extract an entity relationship graph from the text focusing on sustainability, materials, and processes.
                    Return exactly 15 nodes and relevant links.
                    Return ONLY valid JSON:
                    { "nodes": [{ "id": "Entity1", "group": 1 }], "links": [{ "source": "Entity1", "target": "Entity2", "label": "relates to" }] }`;
                    const res = await callGemini(prompt, apiKey, "json");
                    setGraphData(res);
                } catch (e) { alert("Failed: " + e.message); } finally { setLoading(false); }
            };

            // Simple physics engine & canvas renderer
            React.useEffect(() => {
                if (!graphData || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width = canvas.clientWidth;
                let height = canvas.clientHeight;
                canvas.width = width; canvas.height = height;

                // Initialize node positions randomly
                const nodes = graphData.nodes.map(n => ({
                    ...n, x: Math.random() * width, y: Math.random() * height, vx: 0, vy: 0, radius: 25
                }));
                const links = graphData.links;
                
                let animationFrameId;

                const draw = () => {
                    ctx.clearRect(0, 0, width, height);
                    
                    // Simple force-directed logic
                    const k = Math.sqrt((width * height) / nodes.length);
                    
                    // Repulsion
                    for (let i=0; i<nodes.length; i++) {
                        for (let j=i+1; j<nodes.length; j++) {
                            let dx = nodes[i].x - nodes[j].x;
                            let dy = nodes[i].y - nodes[j].y;
                            let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                            let force = (k*k) / dist;
                            let fx = (dx/dist) * force * 0.05;
                            let fy = (dy/dist) * force * 0.05;
                            nodes[i].vx += fx; nodes[i].vy += fy;
                            nodes[j].vx -= fx; nodes[j].vy -= fy;
                        }
                    }

                    // Attraction (Links)
                    links.forEach(link => {
                        let source = nodes.find(n => n.id === link.source) || nodes[0];
                        let target = nodes.find(n => n.id === link.target) || nodes[1];
                        if(!source || !target) return;
                        let dx = target.x - source.x;
                        let dy = target.y - source.y;
                        let dist = Math.sqrt(dx*dx + dy*dy) || 1;
                        let force = (dist*dist) / k;
                        let fx = (dx/dist) * force * 0.005;
                        let fy = (dy/dist) * force * 0.005;
                        source.vx += fx; source.vy += fy;
                        target.vx -= fx; target.vy -= fy;
                    });

                    // Update & Draw
                    const isDark = document.documentElement.classList.contains('dark');
                    const strokeColor = isDark ? '#334155' : '#cbd5e1';
                    const textColor = isDark ? '#f8fafc' : '#0f172a';

                    // Draw links
                    links.forEach(link => {
                        let source = nodes.find(n => n.id === link.source);
                        let target = nodes.find(n => n.id === link.target);
                        if(source && target) {
                            ctx.beginPath();
                            ctx.moveTo(source.x, source.y);
                            ctx.lineTo(target.x, target.y);
                            ctx.strokeStyle = strokeColor;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    });

                    // Draw nodes
                    nodes.forEach(node => {
                        // Apply velocity & dampening
                        node.x += node.vx; node.y += node.vy;
                        node.vx *= 0.85; node.vy *= 0.85;
                        // Bounds
                        node.x = Math.max(node.radius, Math.min(width - node.radius, node.x));
                        node.y = Math.max(node.radius, Math.min(height - node.radius, node.y));

                        ctx.beginPath();
                        ctx.arc(node.x, node.y, node.radius, 0, 2*Math.PI);
                        ctx.fillStyle = '#22c55e';
                        ctx.fill();
                        ctx.strokeStyle = '#166534';
                        ctx.stroke();

                        ctx.fillStyle = textColor;
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText(node.id.substring(0, 15), node.x, node.y + 4);
                    });

                    animationFrameId = requestAnimationFrame(draw);
                };
                
                draw();
                return () => cancelAnimationFrame(animationFrameId);
            }, [graphData]);

            return (
                <div className="flex flex-col h-full animate-fade-in">
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <h2 className="text-xl font-bold">Knowledge Map</h2>
                        <button onClick={generateGraph} disabled={loading} className="bg-eco-600 text-white px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50 flex items-center gap-2">

                                Generate to visualize relationships between entities in your documents.
                            </div>
                        )}
                        <canvas ref={canvasRef} id="knowledge-canvas" className="w-full h-full block"></canvas>
                    </div>
                </div>
            );
        };

                    if (file.type === 'application/pdf') {
                        try {
                            const extracted = await extractTextFromPDF(file);
                            newDocs.push(extracted);
                        } catch (e) {
                            alert(`Failed to parse ${file.name}`);
                        }
                    }
                }
                setDocuments(prev => [...prev, ...newDocs]);
                setIsUploading(false);
                // Reset dashboard analysis trigger
                setDashboardData(null);
            };

            const toggleDocSelection = (id) => {
                setDocuments(docs => docs.map(d => d.id === id ? { ...d, selected: !d.selected } : d));
            };

            const TABS = ['Dashboard', 'Concept Explorer', 'Slide Deck', 'Research Brief', 'Knowledge Map', 'Policy Impact'];

            return (
                <div className="flex flex-col h-screen font-sans">
                    {/* Top Header */}
                    <header className="h-14 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-6 shrink-0 z-10 relative">
                        <div className="flex items-center gap-2">
                            <div className="bg-eco-500 text-white p-1 rounded-md"><Icons.Leaf /></div>
                            <span className="font-bold text-lg tracking-tight">EcoLens</span>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="relative flex items-center">
                                <Icons.Key />
                                <input 
                                    type="password" 
                                    placeholder="Gemini API Key" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="ml-2 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded text-xs px-2 py-1 w-48 focus:outline-none focus:border-eco-500 pr-8"
                                />
                                <div className={`absolute right-2 w-2 h-2 rounded-full ${apiKey ? 'bg-green-500 shadow-[0_0_8px_#22c55e]' : 'bg-slate-300 dark:bg-slate-600'}`}></div>
                            </div>
                            
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors">
                                {darkMode ? <Icons.Sun /> : <Icons.Moon />}
                            </button>
                            
                            <div className="w-8 h-8 bg-gradient-to-tr from-eco-500 to-teal-400 rounded-full border-2 border-white dark:border-slate-800 shadow-sm"></div>
                        </div>
                    </header>

                    {/* Main Workspace Area */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* Left Sidebar (Dark Green Theme like image) */}
                        <aside className="w-64 bg-[#0b1b15] text-slate-300 flex flex-col shrink-0">
                            <div className="p-4 flex-1 overflow-y-auto">
                                <div className="mb-6">
                                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-eco-800/50 rounded-xl cursor-pointer bg-eco-900/20 hover:bg-eco-900/40 transition-colors relative">
                                        <div className="flex flex-col items-center justify-center pt-5 pb-6">
                                            {isUploading ? (
                                                <div className="spinner border-eco-500 border-l-transparent mb-2"></div>
                                            ) : (
                                                <Icons.Upload className="w-8 h-8 mb-2 text-eco-500" />
                                            )}
                                            <p className="text-xs text-eco-100/70 text-center px-4">
                                                <span className="font-semibold text-eco-400">Click to upload</span> or drag PDFs here
                                            </p>
                                        </div>
                                        <input type="file" className="hidden" multiple accept="application/pdf" onChange={handleFileUpload} disabled={isUploading} />
                                    </label>
                                </div>

                                <div>
                                    <h3 className="text-xs uppercase tracking-wider text-eco-600 font-semibold mb-3">Documents</h3>
                                    <ul className="space-y-2">
                                        {documents.map(doc => (
                                            <li key={doc.id} className="bg-[#12271e] rounded-lg p-3 flex items-start gap-3 border border-[#1a382a]">
                                                <input 
                                                    type="checkbox" 
                                                    checked={doc.selected}
                                                    onChange={() => toggleDocSelection(doc.id)}
                                                    className="mt-1 accent-eco-500 w-4 h-4 rounded border-gray-600 bg-gray-700"
                                                />
                                                <div className="flex-1 overflow-hidden">
                                                    <p className="text-sm text-eco-50 truncate" title={doc.name}>{doc.name}</p>
                                                    <div className="flex justify-between items-center mt-1">
                                                        <span className="text-[10px] text-eco-600/80">{doc.size}</span>
                                                        <Icons.CheckCircle className="w-3 h-3 text-eco-500"/>
                                                    </div>
                                                </div>
                                            </li>
                                        ))}
                                        {documents.length === 0 && (
                                            <div className="text-xs text-eco-700/50 italic text-center mt-8">No documents uploaded</div>
                                        )}
                                    </ul>
                                </div>
                            </div>
                            
                            {/* Score card at bottom like image */}
                            <div className="p-4 mt-auto">
                                <div className="bg-[#153225] rounded-xl p-4 border border-[#1f4a36]">
                                    <div className="w-8 h-8 bg-eco-500/20 rounded-lg flex items-center justify-center text-eco-500 mb-3"><Icons.Leaf/></div>
                                    <div className="text-xs text-eco-100/70">Eco Impact Estimated</div>
                                    <div className="text-xl font-bold text-white mt-1">+2.45 kg</div>
                                    <div className="text-[10px] text-eco-500 mt-1">CO₂e Avoided equivalent</div>
                                </div>
                            </div>
                        </aside>

                        {/* Center Content */}
                        <main className="flex-1 flex flex-col min-w-0 bg-slate-100 dark:bg-[#0a0e17]">
                            {/* Top Nav Tabs */}
                            <nav className="flex space-x-1 px-4 pt-3 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 overflow-x-auto shrink-0 scrollbar-hide">
                                {TABS.map(tab => (
                                    <button 
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-4 py-2 text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${
                                            activeTab === tab 
                                            ? 'border-eco-500 text-eco-600 dark:text-eco-400' 
                                            : 'border-transparent text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'
                                        }`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </nav>
                            
                            {/* View Router */}
                            <div className="flex-1 overflow-y-auto p-6">
                                {activeTab === 'Dashboard' && <DashboardView documents={documents} apiKey={apiKey} dashboardData={dashboardData} setDashboardData={setDashboardData} />}
                                {activeTab === 'Concept Explorer' && <ConceptExplorer documents={documents} apiKey={apiKey} />}
                                {activeTab === 'Slide Deck' && <SlideGenerator documents={documents} apiKey={apiKey} />}
                                {activeTab === 'Research Brief' && <ResearchBrief documents={documents} apiKey={apiKey} />}
                                {activeTab === 'Knowledge Map' && <KnowledgeMap documents={documents} apiKey={apiKey} />}
                                {activeTab === 'Policy Impact' && <PolicyImpact documents={documents} apiKey={apiKey} />}
                            </div>
                        </main>

                        {/* Right Sidebar: Chatbot */}
                        <aside className="w-80 border-l border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 shrink-0">
                            <Chatbot documents={documents} apiKey={apiKey} />
                        </aside>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
