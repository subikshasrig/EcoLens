<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLens - AI-Powered Research & Compliance Copilot</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        eco: {
                            900: '#11221b',
                            800: '#1b3b2d',
                            700: '#2d5a45',
                            500: '#10b981',
                            400: '#34d399',
                            100: '#d1fae5',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Vis Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .spinner { border: 3px solid rgba(16, 185, 129, 0.1); border-top-color: #10b981; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .drop-zone { border: 2px dashed #475569; transition: all 0.3s ease; }
        .drop-zone.dragover { border-color: #10b981; background-color: rgba(16, 185, 129, 0.1); }
        
        #network-container { height: 100%; width: 100%; border: 1px solid lightgray; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 h-screen w-screen flex flex-col overflow-hidden transition-colors duration-200">

    <header class="h-16 flex-shrink-0 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-4 z-20">
        <div class="flex items-center space-x-2 text-eco-500 font-bold text-xl">
            <i class="fa-solid fa-leaf"></i>
            <span>EcoLens</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative flex items-center bg-gray-100 dark:bg-gray-700 rounded-md border border-gray-300 px-2 py-1">
                <input type="password" id="api-key-input" placeholder="Gemini API Key..." class="bg-transparent border-none outline-none text-sm w-48 text-gray-700 dark:text-gray-200">
                <div id="api-status-indicator" class="w-3 h-3 rounded-full ml-2 bg-red-500" title="API Status"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-eco-900 text-white p-4">
            <h2 class="text-xs font-bold uppercase text-eco-400 mb-4">Document Library</h2>
            <div id="drop-zone" class="drop-zone rounded-lg p-6 text-center cursor-pointer bg-eco-800/50">
                <p class="text-xs text-gray-300">Drag & drop PDFs here</p>
                <input type="file" id="file-input" multiple accept="application/pdf" class="hidden">
            </div>
            <div id="document-list" class="mt-4 space-y-2"></div>
        </aside>

        <section class="flex-1 p-6 overflow-y-auto">
            <div id="brief-content" class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-sm prose dark:prose-invert max-w-none">
                <div class="text-center text-gray-400 italic">EcoLens is ready. Upload a document to begin.</div>
            </div>
        </section>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.worker.min.js';

        // UPDATED: Use the corrected supported model name
        const MODEL_NAME = 'gemini-2.5-flash-preview-09-2025';

        const state = { apiKey: '', documents: [] };

        // Bindings and logic
        document.getElementById('api-key-input').addEventListener('input', (e) => {
            state.apiKey = e.target.value.trim();
            document.getElementById('api-status-indicator').className = state.apiKey.length > 20 ? 'w-3 h-3 rounded-full ml-2 bg-green-500' : 'w-3 h-3 rounded-full ml-2 bg-red-500';
        });

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            if (e.target.files.length) console.log("Files ready to process...");
        });

    </script>
</body>
</html>
